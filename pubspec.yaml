name: social_braynz_task
description: "Inventory & Stock Manager — offline-first product and sales tracking for a small shop."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase / data layer
  firebase_core: ^4.1.1
  cloud_firestore: 6.4.0

  # State management / DI / routing
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  get_it: ^8.2.0
  go_router: ^16.2.4

  # Notifications
  flutter_local_notifications: ^19.4.2

  # Connectivity
  connectivity_plus: ^6.1.5

  # Utils
  intl: ^0.20.2
  logger: ^2.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  fake_cloud_firestore: ^4.1.1
  mocktail: ^1.0.4
  bloc_test: ^10.0.0

flutter:
  uses-material-design: true
